[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.curl", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.release]
cmds = [
  "php artisan migrate:fresh --seed --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
